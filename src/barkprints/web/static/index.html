<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f3a2e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Barkprints" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/static/icon-192.png" />
<title>Barkprints</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f3ec;
    --fg: #1c1c1c;
    --muted: #6a6a6a;
    --accent: #1f3a2e;
    --card: #ffffff;
    --border: #e3ddd0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14160f;
      --fg: #ece6d8;
      --muted: #9b9685;
      --accent: #8fb39a;
      --card: #1d2018;
      --border: #2c3026;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
            env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  p.tag { margin: 0 0 24px; color: var(--muted); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  label { display: block; font-weight: 600; margin-bottom: 8px; }
  select, input[type=number] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    font: inherit;
  }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }
  .pick {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .pick button {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--fg);
    font: 600 16px/1.2 inherit;
    padding: 16px;
    border-radius: 12px;
    cursor: pointer;
  }
  .pick button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .pick button:disabled { opacity: 0.5; cursor: progress; }
  input[type=file] { display: none; }
  .preview {
    margin-top: 12px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg);
    aspect-ratio: 4 / 3;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview.has-image { display: flex; }
  .result { min-height: 80px; }
  .result blockquote {
    margin: 0;
    padding: 0;
    font-size: 20px;
    line-height: 1.4;
  }
  .result ol { padding-left: 20px; margin: 0; }
  .result li { margin-bottom: 8px; }
  .score {
    display: inline-block;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    margin-right: 8px;
  }
  .error {
    color: #b3261e;
    font-size: 14px;
    margin-top: 8px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.8s linear infinite;
    vertical-align: -3px;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { color: var(--muted); font-size: 13px; text-align: center; margin-top: 24px; }
</style>
</head>
<body>
<main>
  <h1>Barkprints</h1>
  <p class="tag">Listen to what the trees have to say.</p>

  <div class="card">
    <div class="pick">
      <button id="capture-btn" class="primary" type="button">Take a bark photo</button>
      <button id="upload-btn" type="button">Choose from library</button>
    </div>
    <input id="capture-input" type="file" accept="image/*" capture="environment" />
    <input id="upload-input" type="file" accept="image/*" />
    <div id="preview" class="preview"><img id="preview-img" alt="" /></div>
  </div>

  <div class="card">
    <label for="corpus">Corpus</label>
    <select id="corpus"></select>
    <div class="row" style="margin-top: 16px;">
      <div>
        <label for="alpha">Bark influence <span id="alpha-val" class="score"></span></label>
        <input id="alpha" type="range" min="0" max="1" step="0.05" value="0.5" />
        <small style="color: var(--muted);">flowing ↔ wild</small>
      </div>
      <div>
        <label for="maxwords">Max words</label>
        <input id="maxwords" type="number" min="1" max="200" value="20" />
      </div>
    </div>
  </div>

  <div class="card result" id="result" aria-live="polite">
    <p style="color: var(--muted); margin: 0;">Pick an image to hear the bark speak.</p>
  </div>

  <footer>Add to home screen for an app-like experience.</footer>
</main>

<script>
  const corpusSelect = document.getElementById('corpus');
  const alphaInput = document.getElementById('alpha');
  const alphaVal = document.getElementById('alpha-val');
  const maxWordsInput = document.getElementById('maxwords');
  const captureBtn = document.getElementById('capture-btn');
  const uploadBtn = document.getElementById('upload-btn');
  const captureInput = document.getElementById('capture-input');
  const uploadInput = document.getElementById('upload-input');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('preview-img');
  const resultEl = document.getElementById('result');

  const lastSettings = {
    corpus: localStorage.getItem('bp-corpus') || 'nature',
    alpha: localStorage.getItem('bp-alpha') || '0.5',
    maxWords: localStorage.getItem('bp-maxwords') || '20',
  };
  alphaInput.value = lastSettings.alpha;
  maxWordsInput.value = lastSettings.maxWords;
  const showAlpha = () => { alphaVal.textContent = Number(alphaInput.value).toFixed(2); };
  showAlpha();

  async function loadCorpora() {
    try {
      const res = await fetch('/api/corpora');
      const data = await res.json();
      corpusSelect.innerHTML = '';
      for (const c of data.corpora) {
        const opt = document.createElement('option');
        opt.value = c.name;
        opt.textContent = c.theme ? `${c.name} — ${c.theme}` : c.name;
        corpusSelect.appendChild(opt);
      }
      if ([...corpusSelect.options].some(o => o.value === lastSettings.corpus)) {
        corpusSelect.value = lastSettings.corpus;
      }
    } catch (err) {
      showError('Could not load corpora.');
    }
  }

  corpusSelect.addEventListener('change', () => {
    localStorage.setItem('bp-corpus', corpusSelect.value);
  });
  alphaInput.addEventListener('input', () => {
    showAlpha();
    localStorage.setItem('bp-alpha', alphaInput.value);
  });
  maxWordsInput.addEventListener('change', () => {
    localStorage.setItem('bp-maxwords', maxWordsInput.value);
  });

  captureBtn.addEventListener('click', () => captureInput.click());
  uploadBtn.addEventListener('click', () => uploadInput.click());
  captureInput.addEventListener('change', e => onFile(e.target.files[0]));
  uploadInput.addEventListener('change', e => onFile(e.target.files[0]));

  function showError(msg) {
    resultEl.innerHTML = `<p class="error">${escapeHtml(msg)}</p>`;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function showLoading() {
    resultEl.innerHTML = `<p style="color: var(--muted); margin: 0;"><span class="spinner"></span>Listening to the bark…</p>`;
  }

  function renderText(text) {
    resultEl.innerHTML = `<blockquote>${escapeHtml(text)}</blockquote>`;
  }

  async function onFile(file) {
    if (!file) return;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    preview.classList.add('has-image');

    const fd = new FormData();
    fd.append('image', file);
    fd.append('corpus', corpusSelect.value);
    fd.append('alpha', alphaInput.value);
    fd.append('max_words', maxWordsInput.value);

    showLoading();
    captureBtn.disabled = uploadBtn.disabled = true;
    try {
      const res = await fetch('/api/generate', { method: 'POST', body: fd });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showError(err.detail || `Server error (${res.status})`);
        return;
      }
      const data = await res.json();
      renderText(data.text);
    } catch (err) {
      showError('Network error. Try again.');
    } finally {
      captureBtn.disabled = uploadBtn.disabled = false;
    }
  }

  loadCorpora();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
